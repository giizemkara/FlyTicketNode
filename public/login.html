<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyTicket - Administration</title>
    <link rel="stylesheet" href="css/login.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-plane"></i>
                <span>FlyTicket Admin</span>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="admin123" required>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    Sign In
                </button>
            </form>
            <!-- Ana Sayfaya Dön Butonu -->
            <div style="text-align: center; margin-top: 1.5rem;">
                <a href="index.html" style="color: #667eea; text-decoration: none; font-weight: 500; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s;">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>

            <div class="login-info">
                <div class="credential">
                    <strong>Test:</strong> admin / admin123
                </div>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
